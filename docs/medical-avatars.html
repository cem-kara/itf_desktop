<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hastane Personel Avatarları</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #f0f4f8;
    --card: #ffffff;
    --accent-teal: #0d9488;
    --accent-rose: #e11d48;
    --accent-blue: #1d4ed8;
    --accent-amber: #d97706;
    --shadow: 0 8px 32px rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding: 48px 24px;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    color: #1e293b;
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .subtitle {
    text-align: center;
    color: #64748b;
    font-size: 0.9rem;
    margin-bottom: 48px;
    font-weight: 300;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 24px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .card {
    background: var(--card);
    border-radius: 20px;
    padding: 28px 16px 20px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: default;
  }
  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 18px 40px rgba(0,0,0,0.12);
  }

  .card-title {
    font-size: 0.78rem;
    font-weight: 500;
    color: #334155;
    text-align: center;
    line-height: 1.4;
  }
  .badge {
    font-size: 0.65rem;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 99px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
</style>
</head>
