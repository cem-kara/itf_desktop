function makeSvg(name, color, size) {
  const paths = SVG_ICONS[name] || '<circle cx="12" cy="12" r="8"/>';
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">${paths}</svg>`;
}

    function alpha(hex, a) {
      if (!hex || !hex.startsWith("#") || hex.length < 7) return `rgba(0,0,0,${a})`;
      const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
      return `rgba(${r},${g},${b},${a})`;
    }

    function exportPython(T) {
      const nameMap = {
        c_bg0:"BG_PRIMARY", c_bg1:"BG_SECONDARY", c_bg2:"BG_ELEVATED", c_bg3:"BG_HOVER",
        c_bor0:"BORDER_PRIMARY", c_bor1:"BORDER_SECONDARY", c_bor2:"BORDER_FOCUS",
        c_txt0:"TEXT_PRIMARY", c_txt1:"TEXT_SECONDARY", c_txt2:"TEXT_MUTED", c_txt3:"TEXT_DISABLED",
        c_acc0:"ACCENT", c_acc1:"ACCENT2",
        c_inp_bg:"INPUT_BG", c_inp_bor:"INPUT_BORDER",
        c_btn_bg:"BTN_PRIMARY_BG", c_btn_txt:"BTN_PRIMARY_TEXT",
        c_ok:"STATUS_SUCCESS", c_warn:"STATUS_WARNING", c_err:"STATUS_ERROR",
        c_info:"STATUS_INFO", c_purp:"RKE_PURP",
      };
      const colors = Object.entries(nameMap)
        .map(([k,n]) => `    ${n.padEnd(22)}= "${T[k]}"`)
        .join("\n");
      const extras = [
        ``,
        `    # ── Yazı Tipi ──────────────────────────────────────────`,
        `    MONOSPACE             = "${T.f_family}"`,
        `    FONT_SIZE_XS          = ${T.f_xs}   # footer_label, code badge`,
        `    FONT_SIZE_SM          = ${T.f_sm}   # info_label, tablo hücresi`,
        `    FONT_SIZE_BASE        = ${T.f_base}   # buton, input, body`,
        `    FONT_SIZE_MD          = ${T.f_md}   # section_label, value`,
        `    FONT_SIZE_LG          = ${T.f_lg}   # header_name`,
        `    FONT_SIZE_XL          = ${T.f_xl}   # label_title`,
        `    FONT_SIZE_STAT        = ${T.f_stat}   # stat_value, stat_green, stat_red`,
        `    FONT_W_NORMAL         = ${T.f_w_normal}`,
        `    FONT_W_MEDIUM         = ${T.f_w_medium}`,
        `    FONT_W_SEMI           = ${T.f_w_semi}`,
        `    FONT_W_BOLD           = ${T.f_w_bold}`,
        `    LS_FORM               = ${T.f_ls_form}   # em — form etiketi harf aralığı`,
        `    LS_SECTION            = ${T.f_ls_section}   # em — bölüm başlığı harf aralığı`,
        ``,
        `    # ── Boşluklar ──────────────────────────────────────────`,
        `    PAD_INPUT_V           = ${T.p_inp_v}   # px — QLineEdit dikey`,
        `    PAD_INPUT_H           = ${T.p_inp_h}   # px — QLineEdit yatay`,
        `    PAD_BTN_V             = ${T.p_btn_v}   # px — QPushButton dikey`,
        `    PAD_BTN_H             = ${T.p_btn_h}   # px — QPushButton yatay`,
        `    PAD_CELL_V            = ${T.p_cell_v}   # px — tablo hücresi dikey`,
        `    PAD_CELL_H            = ${T.p_cell_h}   # px — tablo hücresi yatay`,
        `    PAD_CARD              = ${T.p_card}   # px — kart / groupbox iç boşluk`,
        `    PAD_SECTION           = ${T.p_section}   # px — bölüm iç boşluk`,
        `    GAP_XS                = ${T.gap_xs}   # px — ikon-metin arası`,
        `    GAP_SM                = ${T.gap_sm}   # px — alanlar arası`,
        `    GAP_MD                = ${T.gap_md}   # px — gruplar arası`,
        `    GAP_LG                = ${T.gap_lg}   # px — bölümler arası`,
        ``,
        `    # ── Kenarlıklar ────────────────────────────────────────`,
        `    RADIUS_SM             = ${T.r_sm}   # px — input, buton`,
        `    RADIUS_MD             = ${T.r_md}   # px — kart, groupbox`,
        `    RADIUS_LG             = ${T.r_lg}   # px — panel, büyük çerçeve`,
        `    RADIUS_PILL           = ${T.r_pill}   # px — hap filtre buton`,
        `    BORDER_WIDTH          = ${T.bw}   # px — tüm bileşenler`,
      ].join("\n");
      return `class DarkTheme:\n${colors}\n${extras}`;
    }

    function ThemeEditor() {
      const [T, setT] = useState(DARK_PRESET);
      const [editorTab, setEditorTab] = useState("renkler");
      const [previewTab, setPreviewTab] = useState(0);
      const [filterSel, setFilterSel] = useState("Aktif");
      const [radio, setRadio] = useState(0);
      const [checks, setChecks] = useState([true,false,false]);
      const [progress, setProgress] = useState(68);
      const [hovBtn, setHovBtn] = useState(null);
      const [focusId, setFocusId] = useState(null);
      const [copied, setCopied] = useState(false);
      const [activePreset, setActivePreset] = useState("dark");

      const set = useCallback((k,v) => setT(p=>({...p,[k]:v})), []);
      const applyPreset = (name) => { setT(name==="dark"?DARK_PRESET:LIGHT_PRESET); setActivePreset(name); };
      const copyCode = () => {
        const code = exportPython(T);
        if (navigator.clipboard) {
          navigator.clipboard.writeText(code).then(() => { setCopied(true); setTimeout(()=>setCopied(false),2500); });
        } else {
          // Fallback for older browsers
          const ta = document.createElement("textarea");
          ta.value = code; document.body.appendChild(ta); ta.select(); document.execCommand("copy");
          document.body.removeChild(ta); setCopied(true); setTimeout(()=>setCopied(false),2500);
        }
      };

      const ff = T.f_family;

      // Input stili
      const inp = (id) => ({
        background:T.c_inp_bg, color:T.c_txt0, outline:"none", fontFamily:ff,
        fontSize:T.f_base, width:"100%", boxSizing:"border-box",
        padding:`${T.p_inp_v}px ${T.p_inp_h}px`,
        border:`${T.bw}px solid ${focusId===id ? T.c_bor2 : T.c_inp_bor}`,
        borderRadius:T.r_sm, transition:"border-color 0.15s",
      });

      // Buton stili
      const btnS = (v, id) => {
        const h = hovBtn===id;
        const base = {
          border:"none", cursor:"pointer", fontFamily:ff, fontWeight:T.f_w_bold,
          fontSize:T.f_base, borderRadius:T.r_sm, transition:"all 0.15s",
          padding:`${T.p_btn_v}px ${T.p_btn_h}px`,
          display:"inline-flex", alignItems:"center", gap:T.gap_xs,
        };
        if(v==="action")    return {...base, background:h?T.c_acc1:T.c_btn_bg, color:T.c_btn_txt, border:`${T.bw}px solid transparent`};
        if(v==="secondary") return {...base, background:h?T.c_bg2:"transparent", color:T.c_txt1, border:`${T.bw}px solid ${T.c_bor1}`};
        if(v==="success")   return {...base, background:alpha(T.c_ok,h?.25:.15), color:T.c_ok, border:`${T.bw}px solid ${alpha(T.c_ok,.4)}`};
        if(v==="danger")    return {...base, background:alpha(T.c_err,h?.25:.15), color:T.c_err, border:`${T.bw}px solid ${alpha(T.c_err,.4)}`};
        if(v==="refresh")   return {...base, background:h?T.c_bg2:"transparent", color:T.c_txt1, border:`${T.bw}px solid ${T.c_bor1}`, padding:`${T.p_btn_v}px ${Math.round(T.p_btn_h*.75)}px`};
        return base;
      };

      const Btn = ({v, id, children, onClick, disabled}) => (
        <button
          style={{...btnS(v,id), ...(disabled?{opacity:.4,cursor:"not-allowed"}:{})}}
          onClick={onClick} disabled={disabled}
          onMouseEnter={()=>!disabled&&setHovBtn(id)}
          onMouseLeave={()=>setHovBtn(null)}>
          {children}
        </button>
      );

      // ── Editör panel renkleri (preset'e göre) ─────────────────────────
      const eBg  = activePreset==="dark" ? "#0a0e14" : "#eef2f7";
      const eBg1 = activePreset==="dark" ? "#111820" : "#ffffff";
      const eBor = activePreset==="dark" ? "#1e2d3d" : "#d1dce8";
      const eTxt = activePreset==="dark" ? "#8fa3b8" : "#475569";
      const eTxt2= activePreset==="dark" ? "#4d6070" : "#94a3b8";
      const eAcc = activePreset==="dark" ? "#3d8ef5" : "#2563eb";

      // ── Editör yardımcı bileşenleri ───────────────────────────────────
      const GHead = ({label}) => (
        <div style={{color:eAcc, fontSize:9, fontWeight:700, letterSpacing:"0.15em",
                     textTransform:"uppercase", marginBottom:8, marginTop:16, paddingBottom:4,
                     borderBottom:`1px solid ${eBor}`}}>
          {label}
        </div>
      );

      const ColorRow = ({k, label, desc}) => (
        <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:8}}>
          <div style={{position:"relative", flexShrink:0}}>
            <div style={{width:32, height:32, borderRadius:T.r_sm, background:T[k],
                         border:`2px solid ${eBor}`, overflow:"hidden",
                         boxShadow:"0 1px 4px rgba(0,0,0,.4)", cursor:"pointer"}}>
              <input type="color" value={T[k]} onChange={e=>set(k,e.target.value)}
                style={{width:"200%", height:"200%", border:"none", cursor:"pointer",
                        transform:"translate(-25%,-25%)", opacity:0,
                        position:"absolute", top:0, left:0}}/>
            </div>
          </div>
          <div style={{flex:1, minWidth:0}}>
            <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:2}}>
              <span style={{color:eTxt, fontSize:10, fontWeight:600}}>{label}</span>
              <input value={T[k]}
                onChange={e=>{const v=e.target.value; if(/^#[0-9a-fA-F]{0,8}$/.test(v)) set(k,v);}}
                style={{width:70, background:eBg, border:`1px solid ${eBor}`, borderRadius:3,
                        padding:"1px 5px", color:eTxt, fontSize:9, fontFamily:"monospace", outline:"none"}}/>
            </div>
            <div style={{color:eTxt2, fontSize:9, fontStyle:"italic"}}>{desc}</div>
          </div>
        </div>
      );

      const SliderRow = ({k, label, min, max, step=1, unit="px", desc}) => (
        <div style={{marginBottom:10}}>
          <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:3}}>
            <span style={{color:eTxt, fontSize:10, fontWeight:600}}>{label}</span>
            <span style={{color:eAcc, fontSize:10, fontFamily:"monospace", fontWeight:700}}>
              {T[k]}{unit}
            </span>
          </div>
          {desc && <div style={{color:eTxt2, fontSize:9, fontStyle:"italic", marginBottom:3}}>{desc}</div>}
          <input type="range" min={min} max={max} step={step} value={T[k]}
            onChange={e=>set(k, step<1?parseFloat(e.target.value):parseInt(e.target.value))}

      const SelectRow = ({k, label, options, desc}) => (
        <div style={{marginBottom:10}}>
          <div style={{color:eTxt, fontSize:10, fontWeight:600, marginBottom:3}}>{label}</div>
          {desc && <div style={{color:eTxt2, fontSize:9, fontStyle:"italic", marginBottom:3}}>{desc}</div>}

            style={{width:"100%", background:eBg, border:`1px solid ${eBor}`, borderRadius:4,
                    padding:"5px 8px", color:eTxt, fontSize:10, fontFamily:"monospace",
                    cursor:"pointer", outline:"none"}}>
            {options.map(o=><option key={o} value={o}>{o}</option>)}
          </select>
        </div>

      const edTabStyle = (id) => ({
        flex:1, padding:"7px 4px", fontSize:10, fontWeight:editorTab===id?700:500,
        cursor:"pointer", border:"none", fontFamily:ff, transition:"all 0.15s",
        background: editorTab===id ? eBg : "transparent",
        color: editorTab===id ? eAcc : eTxt2,
        borderBottom: `2px solid ${editorTab===id ? eAcc : "transparent"}`,

      // ── Önizleme bileşenleri ──────────────────────────────────────────
      const Section = ({title, sub, children}) => (
        <div style={{background:T.c_bg1, border:`${T.bw}px solid ${T.c_bor0}`,
                     borderRadius:T.r_md, padding:`${T.p_section}px`, marginBottom:T.gap_lg}}>
          <div style={{display:"flex", alignItems:"center", gap:T.gap_sm, marginBottom:T.gap_lg}}>
            <div style={{width:3, height:20, background:T.c_acc0, borderRadius:2, flexShrink:0}}/>
            <span style={{color:T.c_acc0, fontSize:T.f_sm, fontWeight:T.f_w_bold, letterSpacing:"0.1em"}}>{title}</span>
            {sub && <span style={{color:T.c_txt2, fontSize:T.f_xs}}>— {sub}</span>}

          {children}
        </div>

      const FormRow = ({label, req, children}) => (
        <div style={{display:"flex", alignItems:"center", gap:T.gap_md, marginBottom:T.gap_sm}}>
          <label style={{color:T.c_txt1, fontSize:T.f_xs, fontWeight:T.f_w_bold,
                         letterSpacing:`${T.f_ls_form}em`, textTransform:"uppercase",

            {label}{req&&<span style={{color:T.c_err}}> *</span>}
          </label>
          <div style={{flex:1}}>{children}</div>
        </div>
      );

      const LRow = ({code, sample, desc}) => (
        <div style={{display:"grid", gridTemplateColumns:"120px 1fr 2fr", gap:"4px 14px",
                     alignItems:"center", marginBottom:6, paddingBottom:6,
                     borderBottom:`1px solid ${alpha(T.c_bor0,.7)}`}}>
          <code style={{background:T.c_bg2, color:T.c_txt2, fontSize:9, padding:"1px 5px",
                         borderRadius:3, fontFamily:"monospace", whiteSpace:"nowrap"}}>{code}</code>
          <div>{sample}</div>
          <span style={{color:T.c_txt2, fontSize:T.f_xs, fontStyle:"italic"}}>{desc}</span>
        </div>
      );

      const TABLO = [
        ["PER-001","Dr. Ayşe Kaya",     "Radyoloji",  "Aktif",  "15.03.2019", T.c_ok],
        ["PER-002","Uzm. Mehmet Demir", "Nükleer Tıp","İzinli", "08.09.2020", T.c_warn],
        ["PER-003","Fiz. Zeynep Çelik", "Radyasyon",  "Aktif",  "22.11.2021", T.c_ok],
        ["PER-004","Dr. Ali Yıldırım",  "Radyoloji",  "Pasif",  "01.04.2018", T.c_err],

      // ══════════════════════════════════════════════════════════════════
      return (
        <div style={{display:"flex", height:"100vh", overflow:"hidden",

          <div style={{width:290, minWidth:290, display:"flex", flexDirection:"column",
                       background:eBg1, borderRight:`1px solid ${eBor}`, flexShrink:0}}>

            <div style={{padding:"12px 14px", borderBottom:`1px solid ${eBor}`, flexShrink:0}}>

                    flex:1, padding:"5px 0", fontSize:11, cursor:"pointer",
                    border:"none", borderRadius:T.r_sm, fontFamily:ff,
                    fontWeight:activePreset===name?700:500, transition:"all 0.15s",
                    background:activePreset===name?eAcc:eBg,
                    color:activePreset===name?(name==="dark"?"#060d1a":"#ffffff"):eTxt,
                  }}>{lbl}</button>
                ))}
              </div>
              <div style={{display:"flex", gap:6}}>
                <button onClick={()=>applyPreset(activePreset)}
                  style={{flex:1, padding:"5px 0", fontSize:10, cursor:"pointer",
                          background:eBg, border:`1px solid ${eBor}`, borderRadius:T.r_sm,
                          color:eTxt, fontFamily:ff}}>

                </button>
                <button onClick={copyCode} style={{
                  flex:2, padding:"5px 0", fontSize:10, cursor:"pointer", border:"none",
                  borderRadius:T.r_sm, fontFamily:ff, fontWeight:700, transition:"all 0.2s",
                  background:copied?"#2ec98e":eAcc,
                  color:copied?"#fff":activePreset==="dark"?"#060d1a":"#fff",
                }}>
                  {copied ? "✓ Kopyalandı!" : "⎘ Python Kodunu Kopyala"}
                </button>
              </div>
            </div>

            {/* Sekmeler */}
            <div style={{display:"flex", borderBottom:`1px solid ${eBor}`, flexShrink:0, background:eBg}}>
              {[["renkler","🎨 Renkler"],["yazi","✏ Yazı"],["bosluk","⬜ Boşluk"],["kenar","◻ Kenarlık"]].map(([id,lbl])=>(
                <button key={id} style={edTabStyle(id)} onClick={()=>setEditorTab(id)}>{lbl}</button>
              ))}
            </div>

            {/* İçerik */}
            <div style={{flex:1, overflowY:"auto", padding:"8px 14px"}}>

              {/* RENKLER */}
              {editorTab==="renkler" && COLOR_GROUPS.map(g=>(

                  <GHead label={g.label}/>
                  {g.tokens.map(t=><ColorRow key={t.k} {...t}/>)}

              {editorTab==="yazi" && <>

                <GHead label="Font Boyutları (px)"/>
                <SliderRow k="f_xs"   label="XS — footer_label, kod badge"    min={8} max={14}/>
                <SliderRow k="f_sm"   label="SM — info_label, tablo hücresi"  min={9} max={15}/>
                <SliderRow k="f_base" label="BASE — buton, input, body"        min={10} max={16}/>
                <SliderRow k="f_md"   label="MD — section_label, value"        min={11} max={17}/>
                <SliderRow k="f_lg"   label="LG — header_name"                 min={12} max={18}/>
                <SliderRow k="f_xl"   label="XL — label_title"                 min={13} max={22}/>
                <SliderRow k="f_stat" label="STAT — stat_value, stat_green"    min={14} max={28}/>

                <GHead label="Font Ağırlıkları"/>
                <SliderRow k="f_w_normal" label="Normal"   min={300} max={500} step={100} unit=""/>
                <SliderRow k="f_w_medium" label="Medium"   min={400} max={600} step={100} unit=""/>
                <SliderRow k="f_w_semi"   label="Semibold" min={500} max={700} step={100} unit=""/>
                <SliderRow k="f_w_bold"   label="Bold — buton, başlık" min={600} max={900} step={100} unit=""/>

                <GHead label="Harf Aralığı (em)"/>
                <SliderRow k="f_ls_form"    label="Form etiketi (uppercase)" min={0} max={0.2} step={0.01} unit="em"/>
                <SliderRow k="f_ls_section" label="Bölüm başlığı"            min={0} max={0.15} step={0.01} unit="em"/>
              </>}

              {/* BOŞLUK */}
              {editorTab==="bosluk" && <>
                <GHead label="Input Padding"/>
                <SliderRow k="p_inp_v" label="Dikey (üst/alt)"  min={2} max={16} desc="QLineEdit, QComboBox, QDateEdit"/>
                <SliderRow k="p_inp_h" label="Yatay (sol/sağ)"  min={4} max={24}/>

                <GHead label="Buton Padding"/>
                <SliderRow k="p_btn_v" label="Dikey (üst/alt)"  min={2} max={16} desc="QPushButton"/>
                <SliderRow k="p_btn_h" label="Yatay (sol/sağ)"  min={6} max={32}/>

                <GHead label="Tablo Hücre Padding"/>
                <SliderRow k="p_cell_v" label="Dikey" min={2} max={16} desc="QTableView::item"/>
                <SliderRow k="p_cell_h" label="Yatay" min={4} max={24}/>

                <GHead label="Kart / Bölüm Padding"/>
                <SliderRow k="p_card"    label="Kart iç boşluk"   min={8} max={32} desc="QGroupBox, filter_panel"/>
                <SliderRow k="p_section" label="Bölüm iç boşluk"  min={10} max={40}/>

                <GHead label="Gap (Elemanlar Arası)"/>
                <SliderRow k="gap_xs" label="XS — ikon / metin arası" min={2} max={12}/>
                <SliderRow k="gap_sm" label="SM — alanlar arası"       min={4} max={16}/>
                <SliderRow k="gap_md" label="MD — gruplar arası"       min={6} max={24}/>
                <SliderRow k="gap_lg" label="LG — bölümler arası"      min={8} max={40}/>
              </>}

              {/* KENAR */}
              {editorTab==="kenar" && <>
                <GHead label="Border Radius (px)"/>
                <SliderRow k="r_sm"   label="SM — Input, Buton"         min={0} max={12} desc="QLineEdit, QPushButton"/>
                <SliderRow k="r_md"   label="MD — Kart, GroupBox"       min={0} max={20} desc="QGroupBox, filter_panel"/>
                <SliderRow k="r_lg"   label="LG — Panel, büyük çerçeve" min={0} max={30}/>
                <SliderRow k="r_pill" label="PILL — Hap filtre buton"   min={0} max={50} desc="btn_filter_all"/>

                <GHead label="Kenarlık Kalınlığı"/>
                <SliderRow k="bw" label="Border Width (px)" min={0} max={4} desc="Tüm bileşenler"/>

                <GHead label="Canlı Radius Önizleme"/>
                <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8}}>
                  {[["r_sm","SM"],["r_md","MD"],["r_lg","LG"],["r_pill","PILL"]].map(([k,lbl])=>(
                    <div key={k} style={{background:eAcc, borderRadius:T[k], padding:"10px",
                                         textAlign:"center", color:activePreset==="dark"?"#060d1a":"#fff",
                                         fontSize:10, fontWeight:700, transition:"border-radius 0.2s"}}>
                      {lbl}<br/><span style={{fontWeight:400}}>{T[k]}px</span>
                    </div>
                  ))}
                </div>
              </>}

            </div>
          </div>

          {/* ══ SAĞ PANEL — CANLI ÖNİZLEME ══════════════════════════════ */}
          <div style={{flex:1, display:"flex", flexDirection:"column", overflow:"hidden"}}>

            {/* Üst şerit */}
            <div style={{background:T.c_bg1, borderBottom:`${T.bw}px solid ${T.c_bor0}`,
                         padding:"0 24px", height:52, display:"flex", alignItems:"center",
                         justifyContent:"space-between", flexShrink:0}}>
              <span style={{color:T.c_txt0, fontSize:T.f_xl, fontWeight:T.f_w_bold}}>
                REPYS — Kontrol Önizleme
              </span>
              <span style={{color:T.c_txt2, fontSize:T.f_xs}}>
                {activePreset==="dark"?"🌙 Dark":"☀️ Light"} — her değişiklik anında yansır
              </span>
            </div>

            {/* Önizleme scroll */}
            <div style={{flex:1, overflowY:"auto", padding:`${T.p_section}px 24px 40px`, background:T.c_bg0}}>

              {/* BUTONLAR */}
              <Section title="BUTONLAR" sub="btn_action · btn_secondary · btn_success · btn_danger · btn_refresh · btn_filter · btn_filter_all">
                <div style={{display:"flex", flexWrap:"wrap", gap:T.gap_sm, marginBottom:T.gap_md}}>
                  <Btn v="action"    id="b1">💾 Kaydet</Btn>
                  <Btn v="secondary" id="b2">✕ İptal</Btn>
                  <Btn v="success"   id="b3">✓ Onayla</Btn>
                  <Btn v="danger"    id="b4">🗑 Sil</Btn>
                  <Btn v="refresh"   id="b5">↺ Yenile</Btn>
                  <Btn v="action"    id="b6" disabled>Devre Dışı</Btn>
                </div>
                <div style={{display:"flex", gap:T.gap_sm, flexWrap:"wrap", alignItems:"center"}}>
                  <span style={{color:T.c_txt2, fontSize:T.f_xs}}>btn_filter →</span>
                  {["Tümü","Aktif","Pasif","İzinli"].map(m=>(
                    <button key={m} onClick={()=>setFilterSel(m)} style={{
                      padding:`${T.p_btn_v}px ${T.p_btn_h}px`, fontSize:T.f_sm,
                      borderRadius:T.r_sm, cursor:"pointer", fontFamily:ff, transition:"all 0.15s",
                      fontWeight:filterSel===m?T.f_w_bold:T.f_w_medium,
                      background:filterSel===m?alpha(T.c_acc0,.18):"transparent",
                      color:filterSel===m?T.c_acc1:T.c_txt1,
                      border:`${T.bw}px solid ${filterSel===m?T.c_acc0:T.c_bor1}`,
                    }}>{m}</button>
                  ))}
                  <span style={{color:T.c_txt2, fontSize:T.f_xs, marginLeft:8}}>btn_filter_all →</span>
                  {["Bu Ay","Bu Yıl"].map(m=>(
                    <button key={m} style={{padding:`${T.p_btn_v}px ${T.p_btn_h}px`, fontSize:T.f_sm,
                      borderRadius:T.r_pill, cursor:"pointer", background:"transparent",
                      color:T.c_txt1, fontFamily:ff, border:`${T.bw}px solid ${T.c_bor1}`}}>{m}</button>
                  ))}
                </div>
              </Section>

              {/* INPUT ALANLARI */}
              <Section title="METİN GİRİŞ ALANLARI" sub="input_field · input_search · input_text · read-only">
                <FormRow label="Ad Soyad" req>
                  <input placeholder="Adı ve soyadını girin..." style={inp("i1")}
                    onFocus={()=>setFocusId("i1")} onBlur={()=>setFocusId(null)}/>
                </FormRow>
                <FormRow label="Kayıt No">
                  <input value="URO-PER-001" readOnly
                    style={{...inp("ro"), background:T.c_bg1, color:T.c_txt1}}/>
                </FormRow>
                <FormRow label="Arama">
                  <input placeholder="🔍 Hızlı ara..." style={inp("i3")}
                    onFocus={()=>setFocusId("i3")} onBlur={()=>setFocusId(null)}/>
                </FormRow>
                <FormRow label="Açıklama">
                  <textarea rows={2} placeholder="Detaylı açıklama..."
                    style={{...inp("i4"), resize:"vertical", fontFamily:ff}}
                    onFocus={()=>setFocusId("i4")} onBlur={()=>setFocusId(null)}/>
                </FormRow>
              </Section>

              {/* SEÇİM KONTROLLERİ */}
              <Section title="SEÇİM KONTROLLERİ" sub="input_combo · input_date · spin · double_spin">
                <div style={{display:"flex", gap:T.gap_lg, flexWrap:"wrap"}}>
                  {[
                    ["Departman", <select style={{...inp("c1")}} onFocus={()=>setFocusId("c1")} onBlur={()=>setFocusId(null)}>
                      {["Radyoloji","Nükleer Tıp","Radyasyon"].map(o=><option key={o}>{o}</option>)}
                    </select>],
                    ["Giriş Tarihi", <input type="date" defaultValue="2024-01-15" style={inp("d1")} onFocus={()=>setFocusId("d1")} onBlur={()=>setFocusId(null)}/>],
                    ["İzin (gün)",   <input type="number" defaultValue={14} style={{...inp("s1"), width:90}} onFocus={()=>setFocusId("s1")} onBlur={()=>setFocusId(null)}/>],
                    ["Doz (mSv)",    <input type="number" defaultValue="20.00" step="0.01" style={{...inp("s2"), width:90}} onFocus={()=>setFocusId("s2")} onBlur={()=>setFocusId(null)}/>],
                  ].map(([lbl,ctrl])=>(
                    <div key={lbl} style={{flex:"1 1 140px"}}>
                      <div style={{color:T.c_txt1, fontSize:T.f_xs, fontWeight:T.f_w_bold,
                                   letterSpacing:`${T.f_ls_form}em`, textTransform:"uppercase", marginBottom:5}}>
                        {lbl}
                      </div>
                      {ctrl}
                    </div>
                  ))}
                </div>
              </Section>

              {/* CHECKBOX & RADIO */}
              <Section title="ONAY VE RADYO BUTONLARI" sub="checkbox · radiobutton">
                <div style={{display:"flex", gap:40, flexWrap:"wrap"}}>
                  <div>
                    <div style={{color:T.c_txt2, fontSize:T.f_xs, letterSpacing:"0.1em", marginBottom:T.gap_sm}}>CHECKBOX</div>
                    {["Aktif personel","İzinde","Devre dışı"].map((lbl,i)=>{
                      const dis=i===2;
                      return (
                        <label key={lbl} onClick={()=>!dis&&setChecks(p=>{const n=[...p];n[i]=!n[i];return n;})}
                          style={{display:"flex", alignItems:"center", gap:T.gap_sm, marginBottom:T.gap_sm,
                                  cursor:dis?"not-allowed":"pointer", opacity:dis?.4:1}}>
                          <div style={{width:T.f_lg, height:T.f_lg, borderRadius:Math.min(T.r_sm,4), flexShrink:0,
                                       border:`${T.bw}px solid ${checks[i]?T.c_acc0:T.c_bor1}`,
                                       background:checks[i]?T.c_acc0:T.c_inp_bg,
                                       display:"flex", alignItems:"center", justifyContent:"center", transition:"all 0.15s"}}>
                            {checks[i]&&<span style={{color:T.c_btn_txt, fontSize:T.f_xs, fontWeight:900, lineHeight:1}}>✓</span>}

                  <div>
                    <div style={{color:T.c_txt2, fontSize:T.f_xs, letterSpacing:"0.1em", marginBottom:T.gap_sm}}>RADIOBUTTON</div>

                      <label key={lbl} onClick={()=>setRadio(i)}
                        style={{display:"flex", alignItems:"center", gap:T.gap_sm, marginBottom:T.gap_sm, cursor:"pointer"}}>

                        <span style={{color:T.c_txt1, fontSize:T.f_base}}>{lbl}</span>
                      </label>

                <LRow code="label_form"     desc="Form etiketi, uppercase"
                  sample={<span style={{color:T.c_txt1, fontSize:T.f_xs, fontWeight:T.f_w_bold, letterSpacing:`${T.f_ls_form}em`, textTransform:"uppercase"}}>TC KİMLİK NUMARASI</span>}/>
                <LRow code="section_label"  desc="Bölüm başlık"
                  sample={<span style={{color:T.c_txt0, fontSize:T.f_md, fontWeight:T.f_w_bold, letterSpacing:`${T.f_ls_section}em`}}>KİŞİSEL BİLGİLER</span>}/>
                <LRow code="info_label"     desc="Yardım / bilgi"
                  sample={<span style={{color:T.c_txt1, fontSize:T.f_sm}}>Son güncelleme: 12.05.2024</span>}/>
                <LRow code="footer_label"   desc="Dipnot"
                  sample={<span style={{color:T.c_txt2, fontSize:T.f_xs}}>REPYS v3.0.0 © 2024</span>}/>
                <LRow code="donem_label"    desc="Dönem — ACCENT"
                  sample={<span style={{color:T.c_acc0, fontSize:T.f_md, fontWeight:T.f_w_semi}}>2024 / 1. Dönem</span>}/>
                <LRow code="max_label"      desc="Uyarı — WARNING"
                  sample={<span style={{color:T.c_warn, fontSize:T.f_sm, fontStyle:"italic"}}>⚠ Maksimum izin hakkı aşıldı</span>}/>
                <LRow code="stat_value"     desc="İstatistik değer"
                  sample={<span style={{color:T.c_txt0, fontSize:T.f_stat, fontWeight:T.f_w_bold}}>142</span>}/>
                <LRow code="stat_green"     desc="Pozitif"
                  sample={<span style={{color:T.c_ok, fontSize:T.f_stat, fontWeight:T.f_w_bold}}>↑ 28</span>}/>
                <LRow code="stat_red"       desc="Negatif"
                  sample={<span style={{color:T.c_err, fontSize:T.f_stat, fontWeight:T.f_w_bold}}>↓ 3</span>}/>
                <LRow code="stat_highlight" desc="Vurgu KPI"
                  sample={<span style={{color:T.c_acc0, fontSize:T.f_stat, fontWeight:T.f_w_bold}}>98.5%</span>}/>
              </Section>

              {/* DURUM BADGE */}
              <Section title="DURUM BADGE'LERİ" sub="header_durum_aktif/pasif/izinli · get_status_color()">
                <div style={{display:"flex", flexWrap:"wrap", gap:T.gap_sm}}>
                  {[["● AKTİF",T.c_ok,.15,.3],["● PASİF",T.c_err,.15,.3],["● İZİNLİ",T.c_warn,.15,.3],
                    ["Tamamlandı",T.c_ok,.12,.25],["Arızalı",T.c_err,.12,.25],["Bakımda",T.c_warn,.12,.25],
                    ["Kalibrasyonda",T.c_purp,.12,.3],["Planlandı",T.c_info,.12,.25],
                  ].map(([lbl,clr,bgA,borA])=>(
                    <span key={lbl} style={{background:alpha(clr,bgA), border:`${T.bw}px solid ${alpha(clr,borA)}`,
                      color:clr, borderRadius:T.r_sm, padding:`3px ${Math.round(T.p_btn_h/2)}px`,
                      fontSize:T.f_sm, fontWeight:T.f_w_bold, letterSpacing:"0.04em"}}>
                      {lbl}
                    </span>
                  ))}
                </div>
              </Section>

              {/* TABLO */}
              <Section title="TABLO" sub="QTableWidget · zebra · 9px uppercase başlık">
                <div style={{border:`${T.bw}px solid ${T.c_bor0}`, borderRadius:T.r_md, overflow:"hidden"}}>
                  <table style={{width:"100%", borderCollapse:"collapse", background:T.c_bg1}}>
                    <thead>
                      <tr>{["PERSONEL ID","AD SOYAD","DEPARTMAN","DURUM","GİRİŞ TARİHİ"].map(h=>(
                        <th key={h} style={{color:T.c_txt2, fontSize:T.f_xs, fontWeight:T.f_w_bold,
                                            letterSpacing:"0.15em", textTransform:"uppercase",
                                            padding:`${T.p_cell_v}px ${T.p_cell_h}px`,
                                            background:T.c_bg0, borderBottom:`${T.bw}px solid ${T.c_bor0}`,
                                            textAlign:"left"}}>{h}</th>
                      ))}</tr>
                    </thead>
                    <tbody>
                      {TABLO.map(([id,ad,dep,durum,tarih,renk],i)=>(
                        <tr key={id} style={{background:i%2===0?T.c_bg1:T.c_bg0}}>
                          {[id,ad,dep].map(v=><td key={v} style={{padding:`${T.p_cell_v}px ${T.p_cell_h}px`,
                            color:T.c_txt1, fontSize:T.f_sm, borderBottom:`${T.bw}px solid ${T.c_bor0}`}}>{v}</td>)}
                          <td style={{padding:`${T.p_cell_v}px ${T.p_cell_h}px`, fontSize:T.f_sm,
                                      fontWeight:T.f_w_semi, color:renk, borderBottom:`${T.bw}px solid ${T.c_bor0}`}}>
                            {durum}</td>
                          <td style={{padding:`${T.p_cell_v}px ${T.p_cell_h}px`, color:T.c_txt2,
                                      fontSize:T.f_sm, borderBottom:`${T.bw}px solid ${T.c_bor0}`}}>
                            {tarih}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </Section>

              {/* GROUPBOX + SEKMELER + PROGRESS */}
              <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:T.gap_lg}}>
                <Section title="GROUPBOX" sub="group_box">
                  {[["Kişisel",["Ad Soyad","TC Kimlik"]],["Çalışma",["Unvan","Sicil No"]]].map(([bas,alanlar])=>(
                    <div key={bas} style={{border:`${T.bw}px solid ${T.c_bor0}`, borderRadius:T.r_md,
                                           padding:`${T.p_card}px`, background:T.c_bg1,
                                           position:"relative", marginBottom:T.gap_sm}}>
                      <div style={{position:"absolute", top:-10, left:12, background:T.c_bg1,
                                   padding:`0 ${T.gap_sm}px`, color:T.c_txt0, fontSize:T.f_sm, fontWeight:T.f_w_semi}}>
                        {bas}
                      </div>
                      {alanlar.map(alan=>(
                        <div key={alan} style={{display:"flex", alignItems:"center", gap:T.gap_sm, marginBottom:T.gap_xs}}>
                          <label style={{color:T.c_txt1, fontSize:T.f_xs, fontWeight:T.f_w_bold,
                                         textTransform:"uppercase", letterSpacing:`${T.f_ls_form}em`, minWidth:70, textAlign:"right"}}>
                            {alan}
                          </label>
                          <input style={{...inp("g"+alan)}} onFocus={()=>setFocusId("g"+alan)} onBlur={()=>setFocusId(null)}/>
                        </div>
                      ))}
                    </div>
                  ))}
                </Section>

                <div>
                  <Section title="SEKMELER (TAB)">
                    <div style={{display:"flex", borderBottom:`${T.bw}px solid ${T.c_bor0}`}}>
                      {["Genel","Teknik","Belgeler"].map((s,i)=>(
                        <div key={s} onClick={()=>setPreviewTab(i)} style={{
                          padding:`${T.p_btn_v}px ${T.p_btn_h}px`, fontSize:T.f_sm, cursor:"pointer",
                          color:previewTab===i?T.c_acc1:T.c_txt1,
                          borderBottom:previewTab===i?`2px solid ${T.c_acc0}`:"2px solid transparent",
                          fontWeight:previewTab===i?T.f_w_bold:T.f_w_medium, transition:"all 0.15s"}}>
                          {s}
                        </div>
                      ))}
                    </div>
                    <div style={{background:T.c_bg1, border:`${T.bw}px solid ${T.c_bor0}`, borderTop:"none",
                                 padding:T.p_card, borderRadius:`0 0 ${T.r_md}px ${T.r_md}px`, minHeight:44}}>
                      <span style={{color:T.c_txt1, fontSize:T.f_sm}}>
                        {["Kişisel bilgiler.","Teknik veriler.","Belgeler."][previewTab]}
                      </span>
                    </div>
                  </Section>

                  <Section title="PROGRESS BAR" sub="Slider ile canlı test">
                    {[[progress,`Yükleme %${progress}`],[40,"%40"],[100,"Tamamlandı"]].map(([v,lbl],i)=>(
                      <div key={i} style={{marginBottom:T.gap_sm}}>
                        <div style={{color:T.c_txt1, fontSize:T.f_xs, marginBottom:3}}>{lbl}</div>
                        <div style={{background:T.c_bor1, borderRadius:2, height:4, overflow:"hidden"}}>
                          <div style={{width:`${v}%`, height:"100%", borderRadius:2, transition:"width 0.3s",
                                       background:v===100?T.c_ok:T.c_bor2}}/>
                        </div>
                      </div>
                    ))}
                    <input type="range" min={0} max={100} value={progress}
                      onChange={e=>setProgress(+e.target.value)}
                      style={{width:"100%", accentColor:T.c_acc0, marginTop:T.gap_sm, cursor:"pointer"}}/>
                  </Section>
                </div>
              </div>

              {/* İSTATİSTİK KARTLARI */}
              <Section title="İSTATİSTİK KARTLARI" sub="stat_label + stat_value/green/red/highlight">
                <div style={{display:"flex", gap:T.gap_md, flexWrap:"wrap"}}>
                  {[["Toplam","142",T.c_txt0,"👥"],["Aktif","128",T.c_ok,"✅"],
                    ["İzinli","11",T.c_acc0,"📅"],["Pasif","3",T.c_err,"❌"]].map(([lbl,val,clr,ico])=>(
                    <div key={lbl} style={{background:T.c_bg2, border:`${T.bw}px solid ${T.c_bor0}`,
                                           borderRadius:T.r_md, padding:`${T.p_card}px`, flex:"1 1 100px"}}>
                      <div style={{display:"flex", alignItems:"center", gap:T.gap_xs, marginBottom:T.gap_xs}}>
                        <span style={{fontSize:T.f_lg}}>{ico}</span>
                        <span style={{color:T.c_txt2, fontSize:T.f_sm}}>{lbl}</span>
                      </div>
                      <span style={{color:clr, fontSize:T.f_stat, fontWeight:T.f_w_bold}}>{val}</span>
                    </div>
                  ))}
                </div>
              </Section>

              {/* FILTER PANEL + FOTOĞRAF */}
              <div style={{display:"grid", gridTemplateColumns:"2fr 1fr", gap:T.gap_lg}}>
                <Section title="FILTER PANEL + SEPARATOR" sub="filter_panel · separator">
                  <div style={{background:T.c_bg1, border:`${T.bw}px solid ${T.c_bor0}`,
                               borderRadius:T.r_lg, padding:`${T.p_card}px`,
                               display:"flex", gap:T.gap_sm, alignItems:"center", flexWrap:"wrap"}}>
                    <input placeholder="🔍 Ara..." style={{...inp("fp"), maxWidth:150}}
                      onFocus={()=>setFocusId("fp")} onBlur={()=>setFocusId(null)}/>
                    <select style={{...inp("fs")}} onFocus={()=>setFocusId("fs")} onBlur={()=>setFocusId(null)}>
                      <option>Tümü</option><option>Aktif</option>
                    </select>
                    <Btn v="action" id="fpb">Filtrele</Btn>
                    <Btn v="secondary" id="fpbc">Temizle</Btn>
                  </div>
                  <div style={{height:1, background:T.c_bor1, margin:`${T.gap_md}px 0`}}/>
                  <span style={{color:T.c_txt2, fontSize:T.f_xs}}>↑ separator çizgisi</span>
                </Section>

                <Section title="FOTOĞRAF ALANI" sub="photo_area · photo_btn">
                  <div style={{display:"flex", gap:T.gap_md}}>
                    <div style={{width:70, height:92, border:`2px dashed ${T.c_bor1}`, borderRadius:T.r_md,
                                 background:T.c_bg2, display:"flex", alignItems:"center", justifyContent:"center",
                                 flexShrink:0, color:T.c_txt2, fontSize:T.f_xs, textAlign:"center"}}>
                      Photo
                    </div>
                    <div>
                      <div style={{color:T.c_txt1, fontSize:T.f_xs, marginBottom:T.gap_sm}}>Maks. 2 MB</div>
                      <div style={{display:"flex", flexDirection:"column", gap:T.gap_xs}}>
                        <Btn v="action" id="pa1">📷 Seç</Btn>
                        <Btn v="danger" id="pa2">🗑 Kaldır</Btn>
                      </div>
                    </div>
                  </div>
                </Section>
              </div>

              {/* İKON GALERİSİ */}
              <IconGallery T={T} />

            </div>
          </div>
        </div>
      );
    }

    // React 18 render
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ThemeEditor/>);
  </script>
</body>
</html>
