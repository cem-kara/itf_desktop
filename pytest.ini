[pytest]
# ─── REPYS Test Yapılandırması ─────────────────────────────────────────────

# Test dizini
testpaths = tests

# Varsayılan seçenekler
# -v   : ayrıntılı çıktı
# -s   : print() çıktılarını göster
# --tb=short : kısa hata izleri (long, short, line, no)
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# Marker tanımları (conftest.py'dekilerle senkron)
markers =
    ui: PySide6 widget gerektiren testler (pytest-qt gerekli)
    integration: Gerçek SQLite DB ile entegrasyon testleri
    slow: Yavaş çalışan testler, 1 saniyeden uzun
    smoke: Temel sistem sağlık kontrolleri

# Test dosyası bulma kuralları
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum pytest versiyonu
minversion = 7.0

# Log ayarları (test sırasında log göster)
log_cli = false
log_cli_level = WARNING
log_file = tests/logs/test_run.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s

# Timeout (pytest-timeout kuruluysa)
# timeout = 30
